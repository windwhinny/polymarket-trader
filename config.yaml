# Polymarket Backtesting Configuration
# Secrets live in .env — this file is safe to commit

api_keys:
  deepseek:
    key: "${DEEPSEEK_API_KEY}"
    base_url: "${DEEPSEEK_BASE_URL:-https://api.deepseek.com}"
    model: "deepseek-v4-flash"
  kimi:
    key: "${KIMI_API_KEY}"
    base_url: "${KIMI_BASE_URL:-https://api.moonshot.cn/v1}"
  ofox:
    key: "${OFOX_API_KEY}"
    # ofox is an Anthropic-and-OpenAI-compatible multi-model gateway.
    # Two base URLs share the same API key; the right one is picked by --provider.
    anthropic_base_url: "${OFOX_ANTHROPIC_BASE_URL:-https://api.ofox.ai/anthropic}"
    openai_base_url: "${OFOX_OPENAI_BASE_URL:-https://api.ofox.ai/v1}"
    anthropic_model: "anthropic/claude-opus-4.7"
    openai_model: "openai/gpt-5.5"
  tavily:
    key: "${TAVILY_API_KEY}"
  serpapi:
    key: "${SERPAPI_API_KEY}"
  serper:
    key: ""

search:
  provider: "serpapi"  # serpapi (Google) or tavily

backtest:
  start_month: "2026-01"
  end_month: "2026-04"
  initial_capital: 1000  # USD
  min_monthly_volume: 10000  # USD
  # Only consider markets that resolve within this many days of the decision
  # date. Aligns with the agent prompt's "T-30d preference". Bump to 60/90
  # for a wider exploration window.
  horizon_days: 30
  # Take-profit threshold: if a pending bet's position price reaches this
  # level on a later decision day, close it for the current price.
  early_exit_threshold: 0.85
  enable_early_exit: true

kelly:
  # Global Kelly throttle applied after confidence weighting.
  fraction: 0.5
  min_edge: 0.03
  max_bet_pct: 0.15

api:
  gamma_base: "https://gamma-api.polymarket.com"
  clob_base: "https://clob.polymarket.com"
  request_delay: 0.3
  # Drop historical CLOB prices if the latest pre-decision point is older than
  # this. 172800 = 2 days; set null/omit to allow any age.
  price_max_age_seconds: 172800
  page_limit: 100
  max_pages: 8

cache:
  enabled: true
  dir: "data/cache"
  ttl_hours: 72
